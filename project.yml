name: HiddenBarIcons
options:
  bundleIdPrefix: com.mekedron
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0

targets:
  HiddenBarIcons:
    type: application
    platform: macOS
    sources:
      - path: HiddenBarIcons/Classes
      - path: HiddenBarIcons/Resources/Assets.xcassets
    dependencies:
      - package: Sparkle
        product: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mekedron.HiddenBarIcons
        PRODUCT_NAME: HiddenBarIcons
        INFOPLIST_FILE: HiddenBarIcons/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: "NO"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.0"
        ENABLE_HARDENED_RUNTIME: "YES"
        ENABLE_APP_SANDBOX: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: "YES"
        # Local/dev builds sign ad-hoc ("Sign to Run Locally") so the project
        # builds without an Apple team. CI builds with CODE_SIGNING_ALLOWED=NO
        # and then codesigns with the real Developer ID afterwards.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"

schemes:
  HiddenBarIcons:
    build:
      targets:
        HiddenBarIcons: all
    run:
      config: Debug
    archive:
      config: Release
